name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            binary_name: coc7e_investigator_creator
            archive_ext: tar.gz
          - os: windows-latest
            artifact_suffix: windows-x86_64
            binary_name: coc7e_investigator_creator.exe
            archive_ext: zip
          - os: macos-latest
            artifact_suffix: macos
            binary_name: coc7e_investigator_creator
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="coc7e-investigator-creator"
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          STAGING_DIR="dist/${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}"

          mkdir -p "$STAGING_DIR"
          cp "target/release/${{ matrix.binary_name }}" "$STAGING_DIR/"
          cp README.md RELEASE.md LICENSE "$STAGING_DIR/"

          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$STAGING_DIR/${{ matrix.binary_name }}"
          fi

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a "dist/${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}.zip" "$STAGING_DIR"
          else
            tar -C dist -czf "dist/${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}.tar.gz" "$(basename "$STAGING_DIR")"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/*${{ matrix.archive_ext }}
          if-no-files-found: error

  installers:
    name: Build installers (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-installers
          - os: windows-latest
            artifact_suffix: windows-installer
          - os: macos-latest
            artifact_suffix: macos-installers

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux desktop/package dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --locked

      - name: Build installer packages
        shell: bash
        run: cargo packager --release

      - name: Show installer artifacts
        shell: bash
        run: find dist/installers -maxdepth 4 -type f -print

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.artifact_suffix }}
          path: dist/installers/**
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - installers
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release artifacts
        run: find dist -maxdepth 5 -type f -print

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 5 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-checksums: dist/SHA256SUMS.txt
          create-storage-record: false

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -d '' artifacts < <(find dist -maxdepth 5 -type f -print0)

          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${artifacts[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${artifacts[@]}" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi
