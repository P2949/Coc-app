name: Release

run-name: >-
  Release
  ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  ${{ github.event_name == 'workflow_dispatch' && inputs.publish == false && '(dry run)' || '' }}

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Version/tag label, for example v0.1.0-test or v0.1.0'
        required: true
        type: string
      publish:
        description: 'Create or update a GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: coc7e-investigator-creator
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            binary_name: coc7e_investigator_creator
            archive_ext: tar.gz

          - os: windows-latest
            artifact_suffix: windows-x86_64
            binary_name: coc7e_investigator_creator.exe
            archive_ext: zip

          - os: macos-latest
            artifact_suffix: macos
            binary_name: coc7e_investigator_creator
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Manual dry-run builds from the selected branch/ref.
          # Manual publish=true builds from the existing tag supplied in inputs.tag.
          # Tag pushes build from the pushed tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag || github.ref }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          STAGING_DIR="dist/${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}"

          mkdir -p "$STAGING_DIR"

          cp "target/release/${{ matrix.binary_name }}" "$STAGING_DIR/"
          cp README.md RELEASE.md LICENSE "$STAGING_DIR/"

          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$STAGING_DIR/${{ matrix.binary_name }}"
          fi

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (
              cd dist
              7z a "${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}.zip" "$(basename "$STAGING_DIR")"
            )
          else
            tar -C dist -czf "dist/${APP_NAME}-${VERSION}-${{ matrix.artifact_suffix }}.tar.gz" "$(basename "$STAGING_DIR")"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 14

  installers:
    name: Build installers (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-installers

          - os: windows-latest
            artifact_suffix: windows-installer

          - os: macos-latest
            artifact_suffix: macos-installers

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Manual dry-run builds from the selected branch/ref.
          # Manual publish=true builds from the existing tag supplied in inputs.tag.
          # Tag pushes build from the pushed tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag || github.ref }}

      - name: Install Linux desktop/package dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install cargo-packager
        shell: bash
        env:
          CARGO_PACKAGER_VERSION: "0.11.2"
        run: |
          set -euo pipefail
          cargo install cargo-packager --version "${CARGO_PACKAGER_VERSION}" --locked
          cargo packager --version

      - name: Verify packager config is present
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          test -f Packager.toml
          echo "---- Packager.toml ----"
          sed -n '1,220p' Packager.toml

      - name: Prepare CI packager config
        shell: bash
        run: |
          set -euo pipefail

          cargo build --release --locked

          mkdir -p dist/packager-bin

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp -v "target/release/coc7e_investigator_creator.exe" \
                  "dist/packager-bin/coc7e_investigator_creator.exe"
          else
            cp -v "target/release/coc7e_investigator_creator" \
                  "dist/packager-bin/coc7e_investigator_creator"
            chmod +x "dist/packager-bin/coc7e_investigator_creator"
          fi

          PACKAGER_BINARY_PATH="coc7e_investigator_creator"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            PACKAGER_BINARY_PATH="coc7e_investigator_creator.exe"
          fi

          PACKAGER_BINARY_PATH="$PACKAGER_BINARY_PATH" python - <<'PY'
          import os
          from pathlib import Path

          src = Path("Packager.toml")
          dst = Path("Packager.ci.toml")

          text = src.read_text()

          # In CI, build explicitly above and package from a stable staging dir.
          text = text.replace('before-packaging-command = "cargo build --release --locked"\n', '')
          text = text.replace('binaries-dir = "."', 'binaries-dir = "dist/packager-bin"')
          text = text.replace(
              'path = "target/release/coc7e_investigator_creator"',
              f'path = "{os.environ["PACKAGER_BINARY_PATH"]}"',
          )

          dst.write_text(text)
          PY

          echo "---- Packager.ci.toml ----"
          sed -n '1,220p' Packager.ci.toml

          echo "---- staged binaries ----"
          find dist/packager-bin -maxdepth 2 -type f -print

      - name: Build installer packages
        shell: bash
        run: |
          set -euo pipefail
          cargo packager --config Packager.ci.toml --release

      - name: Archive macOS app bundles
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          find dist/installers -type d -name '*.app' -prune -print0 |
            while IFS= read -r -d '' app; do
              archive="${app}.tar.gz"
              if [[ -e "$archive" ]]; then
                echo "Refusing to overwrite existing archive: $archive" >&2
                exit 1
              fi

              tar -C "$(dirname "$app")" -czf "$archive" "$(basename "$app")"
              rm -rf "$app"
            done

      - name: Show installer artifacts
        shell: bash
        run: find dist/installers -maxdepth 5 -type f -print

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.artifact_suffix }}
          path: dist/installers/**
          if-no-files-found: error
          retention-days: 14

  release:
    name: Gather, checksum, attest, and optionally publish
    runs-on: ubuntu-latest

    needs:
      - build
      - installers

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Manual dry-run builds from the selected branch/ref.
          # Manual publish=true builds from the existing tag supplied in inputs.tag.
          # Tag pushes build from the pushed tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag || github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/incoming
          merge-multiple: true

      - name: Normalize release asset directory
        shell: bash
        run: |
          set -euo pipefail

          ASSET_DIR="dist/release-assets"
          mkdir -p "$ASSET_DIR"

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"

            if [[ "$name" == "SHA256SUMS.txt" ]]; then
              continue
            fi

            if [[ -e "$ASSET_DIR/$name" ]]; then
              echo "Duplicate release asset filename: $name" >&2
              echo "First path already copied to: $ASSET_DIR/$name" >&2
              echo "Duplicate source path: $file" >&2
              exit 1
            fi

            cp -v "$file" "$ASSET_DIR/$name"
          done < <(find dist/incoming -type f -print0)

      - name: Show release assets
        shell: bash
        run: find dist/release-assets -maxdepth 1 -type f -print | sort

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd dist/release-assets

          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

          cat SHA256SUMS.txt

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-checksums: dist/release-assets/SHA256SUMS.txt
          create-storage-record: false

      - name: Upload workflow test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: dist/release-assets/**
          if-no-files-found: error
          retention-days: 14

      - name: Create or update release
        if: ${{ github.event_name == 'push' || inputs.publish == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          ASSET_DIR="dist/release-assets"

          mapfile -d '' artifacts < <(find "$ASSET_DIR" -maxdepth 1 -type f -print0)

          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${artifacts[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${artifacts[@]}" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi